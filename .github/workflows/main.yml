name: Automacao Reporte Shopee

on:
  workflow_dispatch: # Permite que você clique em um botão "Run workflow" no GitHub para rodar manualmente
  # schedule:
  #   - cron: '0 10 * * 1-5' # Opcional: Descomente para rodar sozinho.

jobs:
  executar-script:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v4 # Atualizado para v4

    - name: Configurar o Python
      uses: actions/setup-python@v5 # Atualizado para v5
      with:
        python-version: '3.10'

    - name: Instalar bibliotecas (requirements.txt)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Rodar o Script de Automação
      env:
        # É aqui que o GitHub Actions injeta o segredo para o Python ler
        MEU_SEGREDO: ${{ secrets.MEU_SEGREDO }} 
      run: python script.py

    - name: Salvar os Prints como Arquivo (Artefato)
      uses: actions/upload-artifact@v4 # Atualizado para v4
      if: always() # Salva o print mesmo que o script dê erro
      with:
        name: prints-da-automacao
        path: "*.png"
