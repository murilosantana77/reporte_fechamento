name: Automacao Reporte Shopee

on:
  workflow_dispatch: # Permite que você clique em um botão "Run workflow" no GitHub para rodar manualmente
  # schedule:
  #   - cron: '0 10 * * 1-5' # Opcional: Descomente para rodar sozinho. Exemplo: Seg a Sex as 10:00 UTC.

jobs:
  executar-script:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v3

    - name: Configurar o Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Instalar bibliotecas (requirements.txt)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Rodar o Script de Automação
      run: python script.py

    - name: Salvar os Prints como Arquivo (Artefato)
      uses: actions/upload-artifact@v3
      if: always() # Salva o print mesmo que o script dê erro na busca do botão
      with:
        name: prints-da-automacao
        path: "*.png"
