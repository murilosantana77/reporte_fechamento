name: Automacao Reporte Shopee

on:
  workflow_dispatch: # Permite rodar manualmente clicando no botão no GitHub
  # schedule:
  #   - cron: '0 10 * * 1-5' # Opcional: Descomente para rodar de Seg a Sex (horário UTC)

jobs:
  executar-script:
    runs-on: ubuntu-latest

    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar bibliotecas (requirements.txt)
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Instalar navegadores do Playwright
      run: |
        python -m playwright install chromium

    - name: Rodar o Script de Automação
      env:
        # Puxa o secret com o conteúdo do JSON de credenciais do Google Sheets
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }} 
        COOKIES_SESSAO: ${{ secrets.COOKIES_SESSAO }} 
      run: python script.py

    - name: Salvar os Prints como Arquivo (Artefato)
      uses: actions/upload-artifact@v4
      if: always() # Salva o print mesmo que o script dê erro
      with:
        name: prints-da-automacao
        path: "*.png"
