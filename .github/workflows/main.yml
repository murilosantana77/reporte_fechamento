name: Automacao Reporte Shopee

on:
  workflow_dispatch: 
  # schedule:
  #   - cron: '0 13 * * 1-5'

jobs:
  executar-script:
    runs-on: ubuntu-latest
    
    env: 
      TZ: America/Sao_Paulo

    steps:
    - name: Baixar o código do repositório
      uses: actions/checkout@v4

    - name: Configurar o Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Instalar bibliotecas
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Instalar Navegadores do Playwright
      run: python -m playwright install chromium --with-deps

    - name: Rodar o Script de Automação
      env:
        # Garante que os segredos estão disponíveis para o seu script.py
        COOKIES_SESSAO: ${{ secrets.COOKIES_SESSAO }}
        GOOGLE_CREDENTIALS: ${{ secrets.GOOGLE_CREDENTIALS }}
      run: python script.py

    - name: Salvar os Prints como Arquivo (Artefato)
      uses: actions/upload-artifact@v4
      if: always() 
      with:
        name: prints-da-automacao
        path: "*.png"
